                title: "[Testing] No automated backend tests",
                body: `## Description

The backend has zero automated tests. There are no unit tests, integration tests, or API endpoint tests. The only test file in the repository is a default Flutter widget counter test (\`test_app/test/widget_test.dart\`) that tests a counter widget that doesn't even exist in the app.

## Impact

- Bugs and regressions are only discovered manually or in production.
- Refactoring is risky without a test safety net.
- New contributors have no specification of expected behavior.

## Recommendation

Add a test suite using **pytest** and **httpx** (with FastAPI's \`TestClient\`):

\`\`\`python
# backend/tests/test_auth.py
from fastapi.testclient import TestClient
from app import app

client = TestClient(app)

def test_signup_and_login():
    res = client.post("/signup", json={"username": "testuser", "password": "secret", "role": "client"})
    assert res.status_code == 200
    assert res.json()["success"] is True

    res = client.post("/login", json={"username": "testuser", "password": "secret"})
    assert res.json()["success"] is True
\`\`\`

Also update the Flutter widget test to test actual app behavior rather than the default counter template.

