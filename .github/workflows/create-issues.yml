Integrate a payment provider such as **Stripe** or **PayPal**:
1. Add a \`POST /payments/create-checkout-session\` endpoint using the Stripe Python SDK.
2. Handle Stripe webhooks (\`payment_intent.succeeded\`, etc.) to update the user's subscription status in the database.
3. Store subscription tier and expiry in the \`users\` table.
4. Gate premium features behind a subscription check.

