name: Create Issues

on:
  push:
    branches:
      - copilot/add-issues-to-tab
    paths:
      - '.github/workflows/create-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create Issues via GitHub Script
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              {
                title: "[Security] Passwords stored and compared in plain text",
                body: `## Description

The application stores user passwords in plain text in the database and compares them directly in SQL queries. This is a critical security vulnerability.

## Location

- \`backend/routers/auth.py\` – The login query does \`COALESCE(password_hash, password) = %s OR password = %s\`, comparing plain-text passwords.
- \`backend/db/database.py\` – The migration sets \`password_hash = COALESCE(password_hash, password)\`, storing the same plain-text value in both columns.
- \`backend/routers/auth.py\` (signup) – Password is stored as-is: \`INSERT INTO users (..., password, password_hash, ...) VALUES (..., %s, %s, ...)\`.

## Impact

If the database is compromised, all user passwords are immediately exposed. Attackers can use these passwords in credential-stuffing attacks across other services since users often reuse passwords.

## Recommendation

- Use a strong, slow hashing algorithm such as **bcrypt** or **argon2** (via the \`passlib\` library) to hash passwords before storing them.
- Remove the plain-text \`password\` column from the \`users\` table.
- Verify passwords by hashing the input and comparing the digest, never the raw value.

\`\`\`python
from passlib.context import CryptContext
pwd_context = CryptContext(schemes=["bcrypt"], deprecated="auto")

hashed = pwd_context.hash(plain_password)          # on signup
is_valid = pwd_context.verify(plain_password, hashed)  # on login
\`\`\`

## Severity

🔴 **Critical**`,
                labels: ["bug", "security"]
              },
              {
                title: "[Security] No server-side session or token authentication",
                body: `## Description

API endpoints accept a \`user_id\` (in request body or query parameters) to identify the acting user, but there is no server-side verification that the caller actually owns that identity. Any client can impersonate any user by simply sending a different \`user_id\`.

## Location

- \`backend/routers/cases.py\` – \`POST /cases/create\` uses \`data.client_id\` from the request body without verifying a session token.
- \`backend/routers/messages.py\` – \`POST /messages/send\` uses \`data.sender_id\` without authentication.
- \`backend/routers/lawyers.py\` – \`POST /lawyer/profile\` uses \`data.lawyer_id\` without authentication.
- All other write endpoints follow the same pattern.

## Impact

Any unauthenticated user can create cases, send messages, apply to cases, or modify profiles on behalf of any other user by guessing or knowing their \`user_id\`.

## Recommendation

Implement JWT-based (or session-token-based) authentication:
1. On login, generate a signed JWT containing \`user_id\` and \`role\` with an expiry.
2. Return the token to the client.
3. Add a FastAPI dependency (e.g., \`Depends(get_current_user)\`) that validates the JWT on every protected endpoint.
4. Compare the token's \`user_id\` with any resource-owner IDs in the request.

## Severity

🔴 **Critical**`,
                labels: ["bug", "security"]
              },
              {
                title: "[Security] Wildcard CORS policy allows any origin",
                body: `## Description

The FastAPI application uses \`allow_origins=["*"]\`, which permits requests from any domain. When combined with \`allow_credentials=True\`, this violates the CORS specification and exposes the API to cross-site request forgery (CSRF) attacks.

## Location

\`backend/app.py\`:
\`\`\`python
app.add_middleware(
    CORSMiddleware,
    allow_origins=["*"],
    allow_credentials=True,   # <-- invalid with wildcard origin
    allow_methods=["*"],
    allow_headers=["*"],
)
\`\`\`

## Impact

Malicious websites can make authenticated requests to the API on behalf of logged-in users. Browsers actually reject \`allow_credentials=True\` with a wildcard origin, which may also cause CORS failures for legitimate users.

## Recommendation

Restrict \`allow_origins\` to the list of trusted frontend domains:
\`\`\`python
allow_origins=[
    "https://advocateai.example.com",
    "http://localhost:8080",  # development only
],
\`\`\`

## Severity

🟠 **High**`,
                labels: ["bug", "security"]
              },
              {
                title: "[Bug] Database connections leak when exceptions are raised",
                body: `## Description

Throughout the backend routers and services, database connections are obtained with \`get_db_connection()\` and closed manually with \`cur.close(); conn.close()\`. If any exception occurs between acquiring the connection and the close calls, the connection is never returned and will leak, eventually exhausting the PostgreSQL connection pool.

## Location

Examples in:
- \`backend/routers/auth.py\` – \`login()\`, \`signup()\`
- \`backend/routers/cases.py\` – \`create_case()\`, \`apply_to_case()\`, \`get_recommended_cases_for_lawyer()\`
- \`backend/routers/lawyers.py\` – \`upsert_lawyer_profile()\`, \`get_watchlist()\`
- \`backend/services/matching_service.py\` – \`refresh_lawyer_responsiveness()\`

## Recommendation

Wrap all database operations in a \`try/finally\` block, or better, use a context manager:

\`\`\`python
# Option A: try/finally
conn = get_db_connection()
try:
    cur = conn.cursor()
    cur.execute(...)
    conn.commit()
finally:
    cur.close()
    conn.close()

# Option B: context manager (requires psycopg2 >= 2.5)
with get_db_connection() as conn:
    with conn.cursor() as cur:
        cur.execute(...)
\`\`\`

Or migrate to a connection pool (e.g., \`psycopg2.pool.SimpleConnectionPool\`) so that connections are properly recycled.

## Severity

🟠 **High**`,
                labels: ["bug"]
              },
              {
                title: "[Bug] Missing HTTP 404 responses — endpoints return empty objects instead",
                body: `## Description

Several GET endpoints silently return an empty object (\`{}\`) or empty array (\`[]\`) when a requested resource does not exist, instead of returning a proper HTTP 404 response. This makes it impossible for clients to distinguish between "resource not found" and "resource exists but is empty".

## Location

- \`backend/routers/cases.py\` – \`get_case_detail()\` returns \`{}\` when case not found.
- \`backend/routers/lawyers.py\` – \`get_lawyer_profile()\` returns \`{}\` when profile not found.
- \`backend/routers/cases.py\` – \`get_case_events()\` does not raise 404 if the case does not exist.

## Example

\`\`\`python
# current (incorrect)
if not row:
    return {}

# correct
from fastapi import HTTPException
if not row:
    raise HTTPException(status_code=404, detail="Case not found.")
\`\`\`

## Impact

Clients (including the Flutter frontend) cannot reliably detect missing resources, leading to silent UI failures and confusing user experiences.

## Severity

🟡 **Medium**`,
                labels: ["bug"]
              },
              {
                title: "[Bug] No pagination on GET /cases/open — returns all cases",
                body: `## Description

The \`GET /cases/open\` endpoint fetches every open public case from the database in a single query with no \`LIMIT\` or cursor-based pagination. As the number of cases grows, this will cause slow queries and large response payloads.

## Location

\`backend/routers/cases.py\` – \`get_open_cases()\`:
\`\`\`python
cur.execute(
    """
    SELECT ... FROM cases c
    WHERE c.status = 'open' AND c.is_public = TRUE
    ORDER BY c.created_at DESC
    """
)
\`\`\`

## Recommendation

Add \`limit\` and \`offset\` (or cursor) query parameters:
\`\`\`python
@router.get("/cases/open")
async def get_open_cases(limit: int = 20, offset: int = 0):
    ...
    cur.execute("SELECT ... LIMIT %s OFFSET %s", (limit, offset))
\`\`\`

The same issue exists in \`GET /cases/recommended/{lawyer_id}\` and \`GET /professionals/{user_id}\`.

## Severity

🟡 **Medium**`,
                labels: ["bug", "performance"]
