🟡 **Medium**`,
                labels: ["bug"]
              },
              {
                title: "[Performance] No database connection pooling — new connection per request",
                body: `## Description

Every API request calls \`get_db_connection()\`, which opens a brand-new TCP connection to PostgreSQL. Establishing a connection is expensive (~10–50 ms) and PostgreSQL has a hard limit on the number of simultaneous connections (default: 100). Under moderate load, this will cause significant latency spikes and potential connection exhaustion.

## Location

\`backend/db/database.py\`:
\`\`\`python
def get_db_connection():
    return psycopg2.connect(...)  # new TCP connection every call
\`\`\`

## Recommendation

Use a connection pool such as \`psycopg2.pool.ThreadedConnectionPool\` or switch to an async-compatible solution like \`asyncpg\` with a pool:

\`\`\`python
from psycopg2 import pool

_pool = pool.ThreadedConnectionPool(
    minconn=2, maxconn=20,
    host=..., database=..., user=..., password=..., port=...
)

def get_db_connection():
    return _pool.getconn()

def release_db_connection(conn):
    _pool.putconn(conn)
\`\`\`

## Severity

🟠 **High**`,
                labels: ["performance"]
              },
              {
                title: "[Security] No file size or type validation on document upload endpoint",
                body: `## Description

The \`POST /documents/analyze\` endpoint accepts file uploads but does not enforce any maximum file size or validate that uploaded files match their declared content type. This can be exploited to:
- Upload arbitrarily large files, causing out-of-memory errors or disk exhaustion on the server.
- Upload malicious file types disguised as PDFs or images.

## Location

\`backend/routers/documents.py\` – \`analyze_uploaded_document()\`:
\`\`\`python
file_bytes = await upload.read()  # no size check
\`\`\`

## Recommendation

1. Add a size limit (e.g., 10 MB per file):
\`\`\`python
MAX_FILE_SIZE = 10 * 1024 * 1024  # 10 MB
if len(file_bytes) > MAX_FILE_SIZE:
    raise HTTPException(status_code=413, detail="File too large. Maximum size is 10 MB.")
\`\`\`

2. Validate MIME types against an allowlist (\`application/pdf\`, \`image/jpeg\`, \`image/png\`).
3. Consider streaming uploads instead of reading the entire file into memory.

## Severity

🟠 **High**`,
                labels: ["bug", "security"]
              },
              {
                title: "[Missing Feature] No input length validation on text fields",
                body: `## Description

The Pydantic models used for request validation (\`CaseCreateRequest\`, \`MessageSendRequest\`, \`SignupRequest\`, etc.) do not define any maximum length constraints on text fields. Users can submit arbitrarily long strings for titles, descriptions, messages, usernames, and other fields, which will be inserted directly into the database.

## Location

- \`backend/models/case.py\` – \`title\`, \`description\`, \`ai_summary\`, etc.
- \`backend/models/message.py\` – \`content\`
- \`backend/models/user.py\` – \`username\`, \`password\`
- \`backend/models/lawyer.py\` – \`bio\`, \`practice_areas\`, \`languages\`

## Recommendation

Use Pydantic's \`Field\` with \`max_length\` (and optionally \`min_length\`) constraints:

\`\`\`python
from pydantic import BaseModel, Field

class CaseCreateRequest(BaseModel):
    title: str = Field(..., min_length=1, max_length=200)
    description: str = Field(..., min_length=10, max_length=5000)
\`\`\`

Also add corresponding \`VARCHAR\` length constraints to the PostgreSQL schema.

## Severity

🟡 **Medium**`,
